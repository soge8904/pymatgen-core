# Make PyPI releases
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        type: choice
        options: [release, test-release]
        default: release
        description: Release to PyPI or TestPyPI.

permissions:
  contents: read

jobs:
  test:
    # run test.yml first to ensure that the test suite is passing
    permissions:
      contents: read
      id-token: write  # test.yml uses OIDC for the codecov upload
    uses: ./.github/workflows/test.yml

  build_sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build source distribution
        run: |
          pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build_wheels:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
        python-version: ["311", "312", "313", "314"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: cp${{ matrix.python-version }}-*

      - name: Save artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  release:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pymatgen-core
    permissions:
      # For PyPI trusted publishing
      id-token: write
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Get build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI or TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          skip-existing: true
          verbose: true

  trigger_pymatgen_docs:
    # Rebuild the umbrella pymatgen docs (which merge in pymatgen-core's API) on every
    # PyPI release. The PYMATGEN_DISPATCH_TOKEN secret is a PAT (or fine-grained token)
    # with `actions: write` on materialsproject/pymatgen.
    needs: release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to materialsproject/pymatgen
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PYMATGEN_DISPATCH_TOKEN }}
          repository: materialsproject/pymatgen
          event-type: pymatgen-core-release
          client-payload: |
            {"version": "${{ github.event.release.tag_name }}",
             "release_url": "${{ github.event.release.html_url }}"}
